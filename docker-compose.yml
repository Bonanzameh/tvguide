services:
  tv-guide:
    build: .
    ports:
      - "3000:3000"
    environment:
      PORT: "3000"
      DATA_DIR: /data
      # Add one or more comma-separated XMLTV URLs or mounted file URLs when ready.
      # Empty disables XMLTV and only uses Pickx. Use "epg.pw" only if you accept
      # a large, slow supplemental feed.
      EPG_XMLTV_URLS: ""
      EPG_FETCH_TIMEOUT_MS: "12000"
      EPG_PICKX_ENABLED: "true"
      EPG_SAMPLE_FALLBACK: "false"
      EPG_RATINGS_ENABLED: "true"
      EPG_RATINGS_MAX_LOOKUPS: "80"
      EPG_PREFETCH_DAYS: "3"
      EPG_PREFETCH_INTERVAL_HOURS: "24"
      EPG_PREFETCH_ON_START: "true"
      # Optional: set this to enable IMDb movie ratings via OMDb.
      OMDB_API_KEY: ""
      EPG_TIMEZONE: Europe/Brussels
    volumes:
      - tv-guide-data:/data

volumes:
  tv-guide-data:
